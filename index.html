<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="NKeys sells custom stickers and keychains with high-detail product pages, persistent cart, reviews, and admin controls."
    />
    <title>NKeys</title>
    <style>
      #boot-status {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #faf7f2;
        color: #141414;
        font-family: Inter, system-ui, sans-serif;
        z-index: 9999;
      }

      #boot-status[hidden] {
        display: none;
      }

      .boot-card {
        width: min(100%, 720px);
        border: 1px solid #e7e2d9;
        border-radius: 32px;
        background: #fff;
        padding: 28px;
        box-shadow: 0 22px 55px rgba(15, 23, 42, 0.08);
      }

      .boot-label {
        margin: 0;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #78716c;
      }

      .boot-title {
        margin: 12px 0 0;
        font-size: 32px;
        line-height: 1.2;
      }

      .boot-copy,
      .boot-error {
        margin: 16px 0 0;
        font-size: 14px;
        line-height: 1.7;
        color: #57534e;
      }

      .boot-error {
        padding: 12px 16px;
        border-radius: 18px;
        background: #f5f5f4;
        word-break: break-word;
      }

      .boot-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }

      .boot-button {
        border: 1px solid #d6d3d1;
        border-radius: 999px;
        padding: 12px 18px;
        background: #fff;
        color: #141414;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      .boot-button-primary {
        background: #141414;
        border-color: #141414;
        color: #fff;
      }
    </style>
  </head>
  <body class="bg-stone-50">
    <div id="boot-status">
      <div class="boot-card">
        <p class="boot-label">Starting app</p>
        <h1 class="boot-title">Loading NKeys</h1>
        <p class="boot-copy">
          If the page turns blank, this panel will stay visible and show the browser error instead.
        </p>
        <p class="boot-error" id="boot-error">Waiting for the React app to start...</p>
        <div class="boot-actions">
          <button class="boot-button boot-button-primary" type="button" id="boot-reload">
            Reload page
          </button>
          <button class="boot-button" type="button" id="boot-clear">
            Clear local demo data
          </button>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (() => {
        const STORE_KEY = "nkeys-react-store-v1";
        const bootStatus = document.getElementById("boot-status");
        const bootError = document.getElementById("boot-error");
        const reloadButton = document.getElementById("boot-reload");
        const clearButton = document.getElementById("boot-clear");
        let appMounted = false;

        const showMessage = (message) => {
          if (bootError) {
            bootError.textContent = message;
          }
          if (bootStatus) {
            bootStatus.hidden = false;
          }
        };

        window.__NKEYS_APP_MOUNTED__ = () => {
          appMounted = true;
          if (bootStatus) {
            bootStatus.hidden = true;
          }
        };

        window.__NKEYS_APP_FAILED__ = (message) => {
          showMessage(message || "Unknown runtime failure");
        };

        window.addEventListener("error", (event) => {
          const message = event?.error?.message || event?.message || "Unknown script error";
          showMessage(`Browser error: ${message}`);
        });

        window.addEventListener("unhandledrejection", (event) => {
          const reason = event?.reason;
          const message =
            typeof reason === "string"
              ? reason
              : reason?.message || "Unhandled promise rejection";
          showMessage(`Async error: ${message}`);
        });

        window.setTimeout(() => {
          const root = document.getElementById("root");
          const hasRenderedContent = Boolean(root && root.childNodes.length);
          if (!appMounted || !hasRenderedContent) {
            showMessage(
              "The app did not finish rendering. Try clearing local demo data or check the browser console."
            );
          }
        }, 3000);

        if (reloadButton) {
          reloadButton.addEventListener("click", () => window.location.reload());
        }

        if (clearButton) {
          clearButton.addEventListener("click", () => {
            try {
              window.localStorage.removeItem(STORE_KEY);
            } catch {}
            window.location.reload();
          });
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
