    <path d="M310 238c0-100 78-176 188-176h56c106 0 186 76 186 176 0 40-13 76-34 104L574 574c-18 32-48 50-82 50s-64-18-82-50L344 460c-22-38-34-72-34-122z" fill="url(#strap)"/>
