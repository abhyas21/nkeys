<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Couple Tag Set</title>
  <desc id="desc">Two matching keychain tags designed as a couple set.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5ef"/>
      <stop offset="100%" stop-color="#ee7f6b"/>
    </linearGradient>
    <linearGradient id="leftTag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffd8ce"/>
    </linearGradient>
    <linearGradient id="rightTag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7f3"/>
      <stop offset="100%" stop-color="#ffc0b6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="18" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="1000" cy="720" r="150" fill="#ffffff" fill-opacity="0.2"/>
  <circle cx="170" cy="180" r="120" fill="#ffffff" fill-opacity="0.26"/>

  <g filter="url(#shadow)" transform="translate(228 140)">
    <circle cx="320" cy="154" r="122" fill="none" stroke="#fefefe" stroke-width="30"/>
    <circle cx="530" cy="190" r="120" fill="none" stroke="#fff0ec" stroke-width="30"/>

    <rect x="250" y="206" width="270" height="356" rx="42" transform="rotate(-8 250 206)" fill="url(#leftTag)"/>
    <rect x="420" y="208" width="270" height="356" rx="42" transform="rotate(8 420 208)" fill="url(#rightTag)"/>

    <circle cx="320" cy="255" r="16" fill="#f09c8e"/>
    <circle cx="612" cy="279" r="16" fill="#ef8e80"/>

    <path d="M453 365c0-28 22-50 49-50 19 0 33 10 41 23 8-13 22-23 41-23 28 0 49 22 49 50 0 57-90 115-90 115s-90-58-90-115z" fill="#ea6f62"/>
    <text x="336" y="540" fill="#5d3333" font-family="Space Grotesk, Arial, sans-serif" font-size="32" font-weight="700">Couple Tag Set</text>
  </g>
</svg>
