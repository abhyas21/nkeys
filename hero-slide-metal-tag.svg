<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Metal Tag Classic</title>
  <desc id="desc">A premium metal keychain tag with engraved initials.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf4e6"/>
      <stop offset="100%" stop-color="#f2bb75"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#aeb5bc"/>
      <stop offset="100%" stop-color="#f5f8fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="160" cy="160" r="100" fill="#ffffff" fill-opacity="0.34"/>
  <circle cx="1050" cy="760" r="140" fill="#ffffff" fill-opacity="0.25"/>

  <g filter="url(#shadow)" transform="translate(250 120)">
    <circle cx="210" cy="210" r="150" fill="none" stroke="url(#metal)" stroke-width="34"/>
    <circle cx="210" cy="210" r="88" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="6"/>
    <rect x="320" y="200" width="400" height="300" rx="54" fill="url(#metal)"/>
    <rect x="340" y="220" width="360" height="260" rx="38" fill="none" stroke="#ffffff" stroke-opacity="0.75" stroke-width="5"/>
    <circle cx="380" cy="260" r="18" fill="#d9dee2"/>
    <text x="392" y="372" fill="#232323" font-family="Syne, Arial, sans-serif" font-size="90" font-weight="800">NK</text>
    <text x="394" y="432" fill="#4f5961" font-family="Space Grotesk, Arial, sans-serif" font-size="30" font-weight="700">Metal Tag Classic</text>
  </g>
</svg>
